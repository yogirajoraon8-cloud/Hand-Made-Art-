<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portrait Sketch Store</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 500px; background: white; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .price-tag { background: #e8f5e9; padding: 10px; border-radius: 8px; text-align: center; font-size: 1.2em; font-weight: bold; color: var(--accent); margin: 15px 0; border: 1px dashed var(--accent); }
        .preview-box { width: 100%; height: 180px; border: 2px dashed #cbd5e0; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-top: 10px; background: #f8fafc; overflow: hidden; }
        .preview-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        button { width: 100%; padding: 15px; background: #25D366; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #128C7E; }
    </style>
</head>
<body>

<div class="container">
    <h2>Portrait Sketch Studio</h2>
    
    <div id="mainForm">
        <div class="form-group">
            <label>Naam</label>
            <input type="text" id="custName" placeholder="Apna Poora Naam">
        </div>
        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" id="custPhone" placeholder="91XXXXXXXXXX">
        </div>

        <div class="form-group">
            <label>Sketch Ka Medium</label>
            <select id="medium" onchange="calculatePrice()">
                <option value="Pencil" data-extra="0">Pencil (Normal)</option>
                <option value="Charcoal" data-extra="200">Charcoal (+ ₹200)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Paper Size</label>
            <select id="size" onchange="calculatePrice()">
                <option value="A4" data-base="500">A4 Size - ₹500</option>
                <option value="A3" data-base="1000">A3 Size - ₹1000</option>
                <option value="A2" data-base="1800">A2 Size - ₹1800</option>
            </select>
        </div>

        <div class="price-tag" id="totalPriceDisplay">Total: ₹500</div>

        <div class="form-group">
            <label>Reference Photo</label>
            <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">
            <div class="preview-box" id="previewContainer">
                <span id="previewText" style="color: #94a3b8;">Photo Preview Yahan Dikhega</span>
            </div>
        </div>

        <button onclick="sendOrder()">Order on WhatsApp</button>
    </div>
</div>

<script>
    function calculatePrice() {
        const sizeSelect = document.getElementById('size');
        const mediumSelect = document.getElementById('medium');
        
        const basePrice = parseInt(sizeSelect.options[sizeSelect.selectedIndex].getAttribute('data-base'));
        const extraPrice = parseInt(mediumSelect.options[mediumSelect.selectedIndex].getAttribute('data-extra'));
        
        const total = basePrice + extraPrice;
        document.getElementById('totalPriceDisplay').innerText = "Total: ₹" + total;
    }

    function previewImage() {
        const file = document.getElementById('imageInput').files[0];
        const previewContainer = document.getElementById('previewContainer');
        const previewText = document.getElementById('previewText');

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewContainer.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
            }
            reader.readAsDataURL(file);
        }
    }

    function sendOrder() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const medium = document.getElementById('medium').value;
        const size = document.getElementById('size').value;
        const price = document.getElementById('totalPriceDisplay').innerText;

        if(!name || !phone) {
            alert("Kripya Naam aur Mobile number bharein!");
            return;
        }

        // APNA WHATSAPP NUMBER YAHAN DALO (Example: 919876543210)
        const myNumber = "9239394050"; 
        
        const message = `*Naya Order!*%0A%0A*Naam:* ${name}%0A*Phone:* ${phone}%0A*Medium:* ${medium}%0A*Size:* ${size}%0A*${price}*%0A%0A_Note: Photo website par check karein._`;
        
        window.open(`https://wa.me/${myNumber}?text=${message}`, '_blank');
    }
</script>

</body>
</html>
