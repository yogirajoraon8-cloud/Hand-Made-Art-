<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Handmade Art Store</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --gray: #bdc3c7; --blue: #3498db; --gold: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 0; margin: 0; color: #333; }
        
        .offer-banner { background: var(--primary); color: white; text-align: center; padding: 8px; font-size: 13px; font-weight: bold; overflow: hidden; }
        .scrolling-text { display: inline-block; white-space: nowrap; animation: scroll-left 15s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .container { max-width: 500px; background: white; margin: 15px auto; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .progress-container { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; }
        .progress-step { width: 30px; height: 30px; background: var(--gray); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; z-index: 1; }
        .progress-step.active { background: var(--accent); }
        .progress-line { position: absolute; top: 15px; left: 0; height: 2px; background: var(--gray); width: 100%; z-index: 0; }

        .step-page { display: none; }
        .step-page.active { display: block; animation: fadeIn 0.4s; }

        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-row { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        .btn-next { background: var(--primary); color: white; }
        .btn-prev { background: #eee; color: #555; }
        .btn-whatsapp { background: #25D366; color: white; }
        
        /* PLUS ICON UPLOAD DESIGN */
        .upload-section { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .plus-btn-label {
            width: 80px; height: 80px;
            border: 2px dashed #aaa;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
            background: #fafafa;
        }
        .plus-btn-label:hover { border-color: var(--accent); color: var(--accent); background: #f0fff4; }
        #imageInput { display: none; } /* Purana button chhupa diya */

        .preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid #ddd; }

        .summary-box { background: #f9f9f9; padding: 10px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 15px; font-size: 13px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Floating Call Button */
        .floating-call { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-decoration: none; z-index: 100; }
    </style>
</head>
<body>

<div class="offer-banner">
    <div class="scrolling-text">🎨 10% Discount on First Custom Order! • Free Home Delivery • Order Now! 🎨</div>
</div>

<div class="container">
    <h2>Art Store</h2>

    <div class="progress-container">
        <div class="progress-line"></div>
        <div class="progress-step active" id="p1">1</div>
        <div class="progress-step" id="p2">2</div>
        <div class="progress-step" id="p3">3</div>
    </div>

    <div class="step-page active" id="step1">
        <div class="form-group"><label>Pura Naam</label><input type="text" id="custName" placeholder="Naam likhein"></div>
        <div class="form-group"><label>Gmail ID</label><input type="email" id="custEmail" placeholder="example@gmail.com"></div>
        <div class="form-group"><label>Phone Number</label><input type="tel" id="custPhone" placeholder="Mobile number"></div>
        <div class="btn-group"><button class="btn-next" onclick="nextStep(2)">Aage Badhein</button></div>
    </div>

    <div class="step-page" id="step2">
        <div class="form-group"><label>Ghar ka Pata</label><textarea id="houseAddress" rows="2"></textarea></div>
        <div class="form-group"><label>District</label><input type="text" id="district"></div>
        <div class="form-group"><label>State</label><input type="text" id="state"></div>
        <div class="form-group"><label>Pin Code</label><input type="number" id="pincode"></div>
        <div class="btn-group">
            <div class="btn-row">
                <button class="btn-prev" onclick="nextStep(1)">Peeche</button>
                <button class="btn-next" onclick="showSummary()">Details Check Karein</button>
            </div>
        </div>
    </div>

    <div class="step-page" id="step3">
        <div id="orderSummary" class="summary-box"></div>
        
        <div class="form-group">
            <label>Apni Photo Upload Karein (+ Icon dabayein)</label>
            <div class="upload-section">
                <div id="previewContainer" style="display: flex; flex-wrap: wrap; gap: 10px;"></div>
                
                <label for="imageInput" class="plus-btn-label">+</label>
                <input type="file" id="imageInput" accept="image/*" multiple onchange="previewImages()">
            </div>
        </div>

        <div class="btn-group">
            <div class="btn-row">
                <button class="btn-prev" onclick="nextStep(2)">Badle</button>
                <button class="btn-whatsapp" onclick="sendOrder()">Order on WhatsApp</button>
            </div>
        </div>
    </div>
</div>

<a href="tel:9239394050" class="floating-call">📞</a>

<script>
    const myNumber = "9239394050";

    function nextStep(step) {
        document.querySelectorAll('.step-page').forEach(page => page.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
        document.querySelectorAll('.progress-step').forEach((dot, index) => {
            index < step ? dot.classList.add('active') : dot.classList.remove('active');
        });
    }

    function showSummary() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        if(!name || !phone) { alert("Details Puri bharein!"); return; }
        document.getElementById('orderSummary').innerHTML = `<strong>Order To:</strong> ${name}<br><strong>Phone:</strong> ${phone}`;
        nextStep(3);
    }

    function previewImages() {
        const files = document.getElementById('imageInput').files;
        const container = document.getElementById('previewContainer');
        container.innerHTML = ''; // Purana preview hatao
        
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.className = 'preview-img';
                container.appendChild(img);
            }
            reader.readAsDataURL(file);
        });
    }

    function sendOrder() {
        const name = document.getElementById('custName').value;
        const fileCount = document.getElementById('imageInput').files.length;
        if(fileCount === 0) { alert("Kam se kam ek photo select karein!"); return; }
        
        const message = `*NAYA ORDER!*%0A*Naam:* ${name}%0A*Photos:* ${fileCount}%0A_Maine photos attach kar di hain._`;
        window.open(`https://wa.me/${myNumber}?text=${message}`, '_blank');
    }
</script>
</body>
</html>
