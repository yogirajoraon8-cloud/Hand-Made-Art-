<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Store Admin Pro</title>

<style>
body{font-family:Arial;margin:0;background:#f4f1ea;}
.page{display:none;padding:20px;}
.active{display:block;}

.card{
background:#fff;
padding:20px;
border-radius:12px;
max-width:500px;
margin:auto;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

button{
width:100%;
padding:12px;
background:#4a3f35;
color:#fff;
border:none;
margin-top:5px;
}

.order-box{
background:#fff;
padding:10px;
margin:10px 0;
border-radius:8px;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#4a3f35;
color:#fff;
display:flex;
justify-content:space-around;
padding:10px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- ORDER PAGE -->
<div id="order" class="page active">
<div class="card">

<h2>Place Order</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<select id="size">
<option value="999">A4 ₹999</option>
<option value="1999">A3 ₹1999</option>
</select>

<button onclick="placeOrder()">Order</button>

<div id="result"></div>

</div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="page">
<div class="card">

<h2>Admin Login</h2>
<input id="adminPass" placeholder="Password">
<button onclick="login()">Login</button>

</div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin" class="page">

<h2 style="text-align:center;">📊 Admin Dashboard</h2>
<div id="ordersList"></div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="showPage('order')">Order</div>
<div onclick="showPage('adminLogin')">Admin</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

// INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// PAGE SWITCH
function showPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

// ORDER
async function placeOrder(){

let name=nameInput.value;
let phone=phoneInput.value;
let amount=size.value;

if(!name || phone.length!=10){
alert("Invalid details");
return;
}

let id="ORD"+Math.floor(Math.random()*1000000);

// SAVE FIREBASE
await db.collection("orders").add({
id,name,phone,amount,status:"Pending"
});

// WHATSAPP
let msg=`Order ID: ${id}
Name: ${name}
Amount: ₹${amount}`;

window.open(`https://wa.me/91XXXXXXXXXX?text=${encodeURIComponent(msg)}`);

result.innerHTML="✅ Order Saved & Sent!";

}

// LOGIN
function login(){
if(adminPass.value==="1234"){
showPage("admin");
loadOrders();
}else{
alert("Wrong Password");
}
}

// LOAD ORDERS (REAL-TIME)
function loadOrders(){

db.collection("orders").onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{

let o=doc.data();

html+=`
<div class="order-box">
<b>${o.id}</b><br>
${o.name} - ${o.phone}<br>
₹${o.amount} - ${o.status}

<button onclick="updateStatus('${doc.id}')">
Mark Completed
</button>
</div>
`;

});

ordersList.innerHTML=html;

});

}

// UPDATE STATUS
function updateStatus(docId){

db.collection("orders").doc(docId).update({
status:"Completed"
});

}

</script>

</body>
</html>
